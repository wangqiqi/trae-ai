<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLO开发监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #fff; }
        .header { background: #2d2d2d; padding: 20px; border-bottom: 1px solid #3e3e3e; }
        .project-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .status-bar { display: flex; gap: 20px; font-size: 14px; }
        .status-item { padding: 5px 10px; border-radius: 15px; }
        .status-active { background: #4caf50; }
        .status-warning { background: #ff9800; }
        .status-error { background: #f44336; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .panel { background: #2d2d2d; border-radius: 8px; padding: 20px; }
        .panel h3 { margin-bottom: 15px; color: #4fc3f7; }
        
        .progress-bar { width: 100%; height: 20px; background: #3e3e3e; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.3s ease; }
        
        .stage-list { list-style: none; }
        .stage-item { display: flex; align-items: center; padding: 10px; margin: 5px 0; background: #3e3e3e; border-radius: 5px; }
        .stage-icon { width: 20px; height: 20px; border-radius: 50%; margin-right: 10px; }
        .stage-completed { background: #4caf50; }
        .stage-current { background: #ff9800; animation: pulse 1.5s infinite; }
        .stage-pending { background: #666; }
        
        .terminal { background: #000; padding: 15px; border-radius: 5px; font-family: 'Courier New', monospace; font-size: 12px; height: 200px; overflow-y: auto; }
        .log-entry { margin: 2px 0; }
        .log-info { color: #4fc3f7; }
        .log-success { color: #4caf50; }
        .log-warning { color: #ff9800; }
        .log-error { color: #f44336; }
        
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .metric { text-align: center; padding: 15px; background: #3e3e3e; border-radius: 5px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #4fc3f7; }
        .metric-label { font-size: 12px; color: #aaa; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="project-title" id="projectTitle">企业级AI图像识别系统</div>
        <div class="status-bar">
            <div class="status-item status-active">运行中</div>
            <div class="status-item" id="currentStage">阶段3: 架构设计</div>
            <div class="status-item" id="lastUpdate">最后更新: 18:55:32</div>
        </div>
    </div>

    <div class="dashboard">
        <div class="panel">
            <h3>📊 项目进度</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 45%"></div>
            </div>
            <div style="margin-top: 10px; font-size: 14px;">总体进度: <span id="progressText">45%</span></div>
        </div>

        <div class="panel">
            <h3>🎯 6A工作流阶段</h3>
            <ul class="stage-list" id="stageList">
                <li class="stage-item">
                    <div class="stage-icon stage-completed"></div>
                    <span>需求对齐 - 已完成</span>
                </li>
                <li class="stage-item">
                    <div class="stage-icon stage-completed"></div>
                    <span>需求共识 - 已完成</span>
                </li>
                <li class="stage-item">
                    <div class="stage-icon stage-current"></div>
                    <span>架构设计 - 进行中</span>
                </li>
                <li class="stage-item">
                    <div class="stage-icon stage-pending"></div>
                    <span>任务分解 - 待开始</span>
                </li>
            </ul>
        </div>

        <div class="panel">
            <h3>📈 实时指标</h3>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="codeCoverage">87%</div>
                    <div class="metric-label">代码覆盖率</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="buildTime">2m34s</div>
                    <div class="metric-label">构建时间</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="testPass">94%</div>
                    <div class="metric-label">测试通过率</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>🖥️ 实时终端</h3>
            <div class="terminal" id="terminal">
                <div class="log-entry log-info">[18:54:15] 开始架构设计阶段...</div>
                <div class="log-entry log-success">[18:54:32] 数据库模型生成完成</div>
                <div class="log-entry log-info">[18:54:45] 正在生成API文档...</div>
                <div class="log-entry log-success">[18:55:10] API设计完成，准备任务分解</div>
            </div>
        </div>
    </div>

    <script>
        // SOLO模式核心逻辑
        class SOLOMonitor {
            constructor() {
                this.projectData = null;
                this.updateInterval = null;
                this.init();
            }

            async init() {
                await this.loadProjectData();
                this.startAutoUpdate();
                this.setupWebSocket();
            }

            async loadProjectData() {
                try {
                    const response = await fetch('../configs/tasksync-config.json');
                    this.projectData = await response.json();
                    this.renderData();
                } catch (error) {
                    console.error('无法加载项目数据:', error);
                }
            }

            renderData() {
                if (!this.projectData) return;

                // 更新项目标题
                document.getElementById('projectTitle').textContent = this.projectData.project;
                
                // 更新当前阶段
                const currentStage = this.projectData.stages[this.projectData.current_stage_index || 2];
                document.getElementById('currentStage').textContent = `阶段${this.projectData.current_stage_index || 3}: ${currentStage}`;
                
                // 更新进度
                const progress = ((this.projectData.current_stage_index || 2) / this.projectData.stages.length) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${Math.round(progress)}%`;
                
                // 更新阶段状态
                this.updateStageList();
                
                // 更新时间
                document.getElementById('lastUpdate').textContent = `最后更新: ${new Date().toLocaleTimeString()}`;
            }

            updateStageList() {
                const stageList = document.getElementById('stageList');
                const stages = this.projectData.stages;
                const currentIndex = this.projectData.current_stage_index || 2;

                stageList.innerHTML = stages.map((stage, index) => {
                    let iconClass = 'stage-pending';
                    if (index < currentIndex) iconClass = 'stage-completed';
                    if (index === currentIndex) iconClass = 'stage-current';

                    return `
                        <li class="stage-item">
                            <div class="stage-icon ${iconClass}"></div>
                            <span>${stage} - ${this.getStageStatus(index, currentIndex)}</span>
                        </li>
                    `;
                }).join('');
            }

            getStageStatus(index, currentIndex) {
                if (index < currentIndex) return '已完成';
                if (index === currentIndex) return '进行中';
                return '待开始';
            }

            startAutoUpdate() {
                this.updateInterval = setInterval(() => {
                    this.simulateProgress();
                }, 5000);
            }

            simulateProgress() {
                // 模拟SOLO自动推进进度
                if (this.projectData && this.projectData.current_stage_index < this.projectData.stages.length - 1) {
                    this.projectData.current_stage_index++;
                    this.renderData();
                    this.addLogEntry(`自动进入下一阶段: ${this.projectData.stages[this.projectData.current_stage_index]}`);
                }
            }

            addLogEntry(message, type = 'info') {
                const terminal = document.getElementById('terminal');
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                terminal.appendChild(entry);
                terminal.scrollTop = terminal.scrollHeight;
            }

            setupWebSocket() {
                // 模拟WebSocket连接，实际可连接到开发服务器
                console.log('SOLO监控系统已激活');
            }
        }

        // 启动SOLO监控
        const soloMonitor = new SOLOMonitor();

        // 快捷键支持
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                soloMonitor.loadProjectData();
            }
        });
    </script>
</body>
</html>
